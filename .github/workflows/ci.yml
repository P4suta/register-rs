# register-rs CI.
#
# Policy:
#   - No `on: schedule`. Dependabot is the only scheduled job.
#   - Every action is SHA-pinned; Dependabot bumps weekly.
#   - Linux-only — despeckle has no platform-specific code.
#   - `Swatinem/rust-cache` for cargo state instead of raw `actions/cache`.

name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: write
  security-events: write
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  # Override .cargo/config.toml's target-cpu=native: CI builds proc-macros on
  # heterogeneous runners and a rust-cache restore SIGILLs an AVX-512 .so on a
  # CPU without it. x86-64-v3 is the portable baseline the config prescribes for CI.
  RUSTFLAGS: -C target-cpu=x86-64-v3
jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@59012be0884e296ca2da49b530610e72c49039ad # v2.81.6
        with:
          tool: cargo-nextest
      - run: cargo build --workspace --all-targets
      - run: cargo nextest run --workspace
      - run: cargo test --doc --workspace
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: taiki-e/install-action@59012be0884e296ca2da49b530610e72c49039ad # v2.81.6
        with:
          tool: cargo-sort,taplo-cli
      - run: cargo fmt --all -- --check
      - run: cargo sort --workspace --check
      - run: taplo fmt --check
  fmt-non-rust:
    name: fmt (json / yaml)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: install biome + yamlfmt
        run: |
          curl -fsSL "https://github.com/biomejs/biome/releases/latest/download/biome-linux-x64" \
            -o /usr/local/bin/biome
          sudo chmod +x /usr/local/bin/biome
          YAMLFMT_VERSION=0.13.0
          curl -fsSL "https://github.com/google/yamlfmt/releases/download/v${YAMLFMT_VERSION}/yamlfmt_${YAMLFMT_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar xz -C /usr/local/bin yamlfmt
      - run: biome format .
      - run: yamlfmt --lint .
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets -- -D warnings
  spell-check:
    name: typos
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: crate-ci/typos@f8a58b6b53f2279f71eb605f03a4ae4d10608f45 # v1.47.0
  py-ruff:
    name: ruff (python tools)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv run ruff check tools
      - run: uv run ruff format --check tools
  py-mypy:
    name: mypy (python tools)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - run: uv run mypy tools
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: actionlint
        env:
          ACTIONLINT_VERSION: 1.7.12
        run: |
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            | tar xz -C /tmp actionlint
          /tmp/actionlint -color
  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@59012be0884e296ca2da49b530610e72c49039ad # v2.81.6
        with:
          tool: cargo-deny
      - run: cargo deny check advisories bans licenses sources
  cargo-machete:
    name: cargo-machete (unused deps)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: taiki-e/install-action@59012be0884e296ca2da49b530610e72c49039ad # v2.81.6
        with:
          tool: cargo-machete
      - run: cargo machete
  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: taiki-e/install-action@59012be0884e296ca2da49b530610e72c49039ad # v2.81.6
        with:
          tool: cargo-audit
      # RUSTSEC-2024-0436 (paste, unmaintained) is an unactionable transitive dep
      # via imageproc -> nalgebra -> simba; mirrors deny.toml's ignore.
      - run: cargo audit --deny warnings --ignore RUSTSEC-2024-0436
  dependency-review:
    name: dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: true
          show-openssf-scorecard: false
  conventional-commits:
    name: conventional commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
