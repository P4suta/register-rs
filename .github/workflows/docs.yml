# Build `cargo doc` and deploy to GitHub Pages on every successful push to main.

name: docs
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    name: build (cargo doc)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rui314/setup-mold@9c9c13bf4c3f1adef0cc596abc155580bcb04444 # v1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo doc
        env:
          RUSTDOCFLAGS: -D warnings
          # Override .cargo/config.toml's `target-cpu=native`: the runner builds
          # proc-macros (e.g. thiserror_impl) with the host's full ISA, and a
          # rust-cache restore across heterogeneous runners then SIGILLs when an
          # AVX-512 .so lands on a CPU without it. x86-64-v3 is the portable
          # baseline the config comment prescribes for CI.
          RUSTFLAGS: -C target-cpu=x86-64-v3
        run: cargo doc --workspace --no-deps
      - name: write redirect index.html (stable rustdoc has no auto-index)
        run: |
          cat > target/doc/index.html <<'HTML'
          <!doctype html><meta http-equiv="refresh" content="0; url=register_core/index.html">
          HTML
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: target/doc
  deploy:
    name: deploy (gh-pages)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
