[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
version = 2
yanked = "deny"
# paste is unmaintained (RUSTSEC-2024-0436) but only reaches us transitively via
# imageproc -> nalgebra -> simba -> paste. imageproc's affine warp (warp_into /
# Projection) is load-bearing for register-core and has no paste-free upgrade.
# Accept it here; revisit when imageproc / nalgebra drop paste.
ignore = ["RUSTSEC-2024-0436"]

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "CC0-1.0",
  "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
deny = [{ name = "openssl" }, { name = "openssl-sys" }]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
